// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    // Pin the Kotlin compiler plugin to match `android.kotlinVersion` in gradle.properties.
    // Without this, RN's libs.versions.toml pins kotlin-gradle-plugin to 2.1.20, which
    // is unable to read the 2.3.0 stdlib metadata (com.google.ai.edge.litertlm forces 2.3.0).
    classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${providers.gradleProperty('android.kotlinVersion').get()}")
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }
}

ext {
    buildToolsVersion = "35.0.0"
    // 35 = stable Android 15 SDK. Bump to 36 only when a dependency requires it.
    compileSdkVersion = 35
    targetSdkVersion = 34
    minSdkVersion = 24
    ndkVersion = "27.1.12297006"
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
