name: CI / EAS Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Lint, type-check, and unit tests ──────────────────────────────────────
  test:
    name: Test & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typescript

      - name: Unit tests
        run: npm test -- --ci --coverage

  # ── EAS development build (iOS simulator + Android APK) ───────────────────
  eas-build-development:
    name: EAS Build (development)
    runs-on: ubuntu-latest
    needs: test
    # Only run on pushes to main/master, not on PRs
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (APK for emulator)
        run: eas build --platform android --profile development --non-interactive --no-wait

      - name: Build iOS (simulator)
        run: eas build --platform ios --profile development --non-interactive --no-wait

  # ── EAS preview build on releases ─────────────────────────────────────────
  eas-build-preview:
    name: EAS Build (preview)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build preview (both platforms)
        run: eas build --platform all --profile preview --non-interactive --no-wait
