name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── TypeScript + Jest ──────────────────────────────────────────────────────
  test:
    name: TypeScript & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npm run typescript

      - name: Unit tests
        run: npm test -- --ci --coverage --runInBand

  # ── Gradle build (compile check, no emulator needed) ─────────────────────
  gradle-build:
    name: Android Gradle Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle', 'android/**/*.gradle.kts', 'android/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platforms;android-35" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "ndk;27.1.12297006"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android/local.properties

      - name: Gradle assembleDebug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2 -Dorg.gradle.jvmargs=-Xmx4g"

      - name: Android Lint
        run: cd android && ./gradlew lint --no-daemon
        continue-on-error: true

  # ── EAS development build (optional, requires EXPO_TOKEN secret) ──────────
  eas-build:
    name: EAS Build (development)
    runs-on: ubuntu-latest
    needs: [test, gradle-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check EXPO_TOKEN
        id: check-token
        run: |
          if [ -n "$EXPO_TOKEN" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "EXPO_TOKEN secret not configured — skipping EAS build."
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Expo
        if: steps.check-token.outputs.available == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        if: steps.check-token.outputs.available == 'true'
        run: eas build --platform android --profile development --non-interactive --no-wait

      - name: Build iOS simulator
        if: steps.check-token.outputs.available == 'true'
        run: eas build --platform ios --profile development --non-interactive --no-wait
